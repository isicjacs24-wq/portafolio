<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Luxury Cars Catalog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#050505;
    overflow:hidden;
    color:#fff;
}

/* =========================
SLIDER
========================= */

.slider{
    width:100%;
    height:100vh;
    position:relative;
}

/* =========================
SLIDES
========================= */

.slide{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transform:scale(1.05);
    transition:1s ease;
    background-size:cover;
    background-position:center;
    padding:20px;
}

.slide.active{
    opacity:1;
    visibility:visible;
    transform:scale(1);
}

/* =========================
OVERLAY
========================= */

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.75),
        rgba(0,0,0,.55)
    );
}

/* =========================
CARD
========================= */

.card{
    position:relative;
    z-index:10;
    width:100%;
    max-width:1100px;
    min-height:620px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    border-radius:35px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;
    padding:50px;
    overflow:hidden;
    box-shadow:
    0 30px 60px rgba(0,0,0,.4);
}

/* =========================
CONTENT
========================= */

.content{
    flex:1;
    animation:fadeUp 1s ease;
}

.brand{
    color:#ff4d00;
    font-size:14px;
    letter-spacing:5px;
    margin-bottom:10px;
    font-weight:600;
}

h1{
    font-size:68px;
    line-height:1;
    margin-bottom:20px;
}

.desc{
    color:#ddd;
    line-height:1.8;
    margin-bottom:25px;
    max-width:500px;
}

.price{
    font-size:42px;
    font-weight:700;
    margin-bottom:25px;
}

/* =========================
SPECS
========================= */

.specs{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:35px;
}

.spec{
    padding:10px 18px;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    font-size:14px;
}

/* =========================
BUTTONS
========================= */

.buttons{
    display:flex;
    gap:15px;
}

.btn{
    padding:15px 28px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
    font-size:15px;
}

.primary{
    background:#ff4d00;
    color:#fff;
}

.primary:hover{
    transform:translateY(-3px);
    background:#ff682e;
}

.secondary{
    background:rgba(255,255,255,.08);
    color:#fff;
    border:1px solid rgba(255,255,255,.1);
}

.secondary:hover{
    background:#fff;
    color:#000;
}

/* =========================
IMAGE
========================= */

.car-box{
    flex:1;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.car-box img{
    width:100%;
    max-width:550px;
    filter:drop-shadow(0 30px 40px rgba(0,0,0,.6));
    transition:.5s ease;
    cursor:pointer;
}

.car-box:hover img{
    transform:scale(1.05) translateY(-10px);
}

/* =========================
POPUP
========================= */

.popup{
    position:absolute;
    bottom:0;
    width:90%;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:25px;
    opacity:0;
    transform:translateY(20px);
    transition:.4s ease;
}

.car-box:hover .popup{
    opacity:1;
    transform:translateY(0);
}

.popup h3{
    margin-bottom:10px;
    color:#ff4d00;
}

.popup p{
    color:#ddd;
    line-height:1.7;
    font-size:14px;
}

/* =========================
ARROWS
========================= */

.controls{
    position:absolute;
    width:100%;
    top:50%;
    left:0;
    transform:translateY(-50%);
    z-index:100;
    display:flex;
    justify-content:space-between;
    padding:0 25px;
}

.control-btn{
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    color:#fff;
    font-size:28px;
    cursor:pointer;
    transition:.3s;
}

.control-btn:hover{
    background:#ff4d00;
    transform:scale(1.1);
}

/* =========================
INDICATORS
========================= */

.indicators{
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:100;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#666;
    transition:.3s;
}

.dot.active{
    width:35px;
    border-radius:20px;
    background:#ff4d00;
}

/* =========================
ANIMATION
========================= */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:980px){

    body{
        overflow:auto;
    }

    .slide{
        padding:15px;
    }

    .card{
        flex-direction:column;
        text-align:center;
        padding:35px 25px;
        gap:20px;
        min-height:auto;
    }

    h1{
        font-size:42px;
    }

    .desc{
        max-width:100%;
        font-size:15px;
    }

    .price{
        font-size:32px;
    }

    .specs{
        justify-content:center;
    }

    .buttons{
        justify-content:center;
        flex-wrap:wrap;
    }

    .btn{
        width:100%;
    }

    .car-box img{
        max-width:340px;
    }

    .popup{
        position:relative;
        opacity:1;
        transform:none;
        margin-top:20px;
        width:100%;
    }

    .controls{
        padding:0 10px;
    }

    .control-btn{
        width:50px;
        height:50px;
        font-size:22px;
    }

}

</style>
</head>
<body>

<div class="slider" id="slider"></div>

<div class="controls">
    <button class="control-btn" id="prev">‹</button>
    <button class="control-btn" id="next">›</button>
</div>

<div class="indicators" id="indicators"></div>

<script>

const cars = [

{
name:"Mustang GT",
brand:"FORD PERFORMANCE",
price:"$1,250,000 MXN",
image:"https://pngimg.com/d/mustang_PNG48.png",
bg:"https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1600",
desc:"Motor V8 con diseño agresivo y experiencia deportiva incomparable.",
specs:["V8","500HP","2026"]
},

{
name:"BMW M4",
brand:"BMW SERIES",
price:"$1,780,000 MXN",
image:"https://pngimg.com/d/bmw_PNG1716.png",
bg:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600",
desc:"Elegancia alemana con potencia extrema y acabados premium.",
specs:["Twin Turbo","503HP","AWD"]
},

{
name:"Porsche 911",
brand:"PORSCHE",
price:"$3,450,000 MXN",
image:"https://pngimg.com/d/porsche_PNG10615.png",
bg:"https://images.unsplash.com/photo-1544636331-e26879cd4d9b?q=80&w=1600",
desc:"Icono deportivo con aceleración brutal y lujo refinado.",
specs:["Turbo","640HP","Sport"]
},

{
name:"Audi R8",
brand:"AUDI SPORT",
price:"$4,200,000 MXN",
image:"https://pngimg.com/d/audi_PNG1754.png",
bg:"https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=1600",
desc:"Superdeportivo elegante con motor V10 y sonido espectacular.",
specs:["V10","602HP","Quattro"]
},

{
name:"Tesla Model S",
brand:"TESLA",
price:"$2,100,000 MXN",
image:"https://pngimg.com/d/tesla_PNG36.png",
bg:"https://images.unsplash.com/photo-1560958089-b8a1929cea89?q=80&w=1600",
desc:"Tecnología eléctrica avanzada con diseño minimalista premium.",
specs:["Electric","1020HP","Autopilot"]
}

];

const slider = document.getElementById("slider");
const indicators = document.getElementById("indicators");

cars.forEach((car,index)=>{

slider.innerHTML += `

<section class="slide ${index === 0 ? 'active' : ''}" style="background-image:url('${car.bg}')">

<div class="overlay"></div>

<div class="card">

<div class="content">

<div class="brand">${car.brand}</div>

<h1>${car.name}</h1>

<p class="desc">
${car.desc}
</p>

<div class="price">
${car.price}
</div>

<div class="specs">
${car.specs.map(spec=>`<div class="spec">${spec}</div>`).join("")}
</div>

<div class="buttons">
<button class="btn primary">Cotizar</button>
<button class="btn secondary">Detalles</button>
</div>

</div>

<div class="car-box">

<img src="${car.image}" alt="${car.name}">

<div class="popup">

<h3>${car.name}</h3>

<p>
Vehículo premium con tecnología avanzada, diseño moderno y rendimiento de alto nivel.
</p>

</div>

</div>

</div>

</section>

`;

indicators.innerHTML += `
<div class="dot ${index === 0 ? 'active' : ''}"></div>
`;

});

const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

let current = 0;

function showSlide(index){

slides.forEach(slide=>{
slide.classList.remove("active");
});

dots.forEach(dot=>{
dot.classList.remove("active");
});

current = index;

if(current >= slides.length){
current = 0;
}

if(current < 0){
current = slides.length -1;
}

slides[current].classList.add("active");
dots[current].classList.add("active");

}

document.getElementById("next").onclick = ()=>{
showSlide(current +1);
};

document.getElementById("prev").onclick = ()=>{
showSlide(current -1);
};

window.addEventListener("wheel",(e)=>{

if(e.deltaY > 0){
showSlide(current +1);
}else{
showSlide(current -1);
}

});

setInterval(()=>{
showSlide(current +1);
},7000);

</script>

</body>
</html>
